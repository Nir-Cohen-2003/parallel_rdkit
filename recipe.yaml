context:
    name: "parallel_rdkit"
    version: "0.4.0"

package:
    name: "${{ name|lower }}"
    version: "${{ version }}"

source:
    path: .
    use_gitignore: true
    filter:
        exclude:
            - tests/**
            - docs/**
            - data/**
            - benchmarks/**

build:
    number: 0
    python:
        version_independent: true

requirements:
    ignore_run_exports:
        by_name:
            - python_abi
    build:
        - ${{ compiler('cxx') }}
        - python >=3.8
        - pip
        - python-build
        - librdkit-dev
        - nanobind
        - boost
        - scikit-build-core
        - cmake
        - ninja
    host:
        - python >=3.8
        - pip
        - python-build
        - librdkit-dev
        - nanobind
        - boost
        - scikit-build-core
        - cmake
        - ninja
    run:
        - python >=3.8
        - rdkit
        - numpy
        - libboost

tests:
    - python:
          imports:
              - parallel_rdkit

about:
    summary: "A parallel RDKit utilities implementation"
    license: Apache-2.0
