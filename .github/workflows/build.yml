name: Build and Publish

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    release:
        types: [created]
    workflow_dispatch:

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]

        steps:
            - uses: actions/checkout@v4

            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@v0.8.1
              with:
                  pixi-version: latest

            - name: Install rattler-build
              run: pixi global install rattler-build

            - name: Build conda packages (which also builds wheels)
              run: rattler-build build --recipe recipe.yaml --output-dir dist/conda
              shell: bash

            - name: Upload wheel artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ matrix.os }}
                  path: dist/wheels/*.whl

            - name: Upload conda artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: conda-dist-${{ matrix.os }}
                  path: dist/conda/**/*.conda

    publish:
        name: Publish
        needs: build
        runs-on: ubuntu-latest
        if: github.event_name == 'release' && github.event.action == 'created'

        steps:
            - name: Download all wheel artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  pattern: dist-*
                  merge-multiple: true

            - name: Publish to TestPyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/
                  password: ${{ secrets.TEST_PYPI_API_TOKEN }}

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  password: ${{ secrets.PYPI_API_TOKEN }}

            - name: Download all conda artifacts
              uses: actions/download-artifact@v4
              with:
                  path: conda-dist
                  pattern: conda-dist-*
                  merge-multiple: true

            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@v0.8.1
              with:
                  pixi-version: latest

            - name: Install rattler-build and anaconda-client
              run: pixi global install rattler-build anaconda-client

            - name: Publish to prefix.dev and Anaconda.org
              run: |
                  for package in conda-dist/**/*.conda; do
                    rattler-build upload prefix --api-key "${{ secrets.PREFIX_API_KEY }}" "$package"
                    anaconda upload --api-key "${{ secrets.ANACONDA_API_KEY }}" "$package"
                  done
              shell: bash
