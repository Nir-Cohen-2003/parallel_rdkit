name: Build and Publish

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    release:
        types: [created]
    workflow_dispatch:

jobs:
    build-and-publish:
        name: Build and Publish on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
        permissions:
            id-token: write
            contents: read

        steps:
            - uses: actions/checkout@v4

            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@v0.9.2
              with:
                  pixi-version: latest

            - name: Build packages
              run: |
                  pixi build
              shell: bash

            - name: Upload wheel artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ matrix.os }}
                  path: dist/*.whl

            - name: Upload conda artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: conda-dist-${{ matrix.os }}
                  path: "*.conda"

            - name: Publish to PyPI
              if: github.event_name == 'release' && github.event.action == 'created'
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist/
              continue-on-error: true

            - name: Publish to prefix.dev
              if: github.event_name == 'release' && github.event.action == 'created'
              run: |
                  for package in *.conda; do
                    pixi project channel upload --host https://prefix.dev prefix-dev "$package" || true
                  done
              shell: bash
