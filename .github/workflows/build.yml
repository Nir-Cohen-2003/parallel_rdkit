name: Build and Publish

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    release:
        types: [created]
    workflow_dispatch:

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]

        steps:
            - uses: actions/checkout@v4

            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@v0.9.2
              with:
                  pixi-version: latest

            - name: Build packages
              run: |
                  pixi build
              shell: bash

            - name: Upload wheel artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ matrix.os }}
                  path: dist/*.whl

            - name: Upload conda artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: conda-dist-${{ matrix.os }}
                  path: "*.conda"

    publish:
        name: Publish
        needs: build
        runs-on: ubuntu-latest
        if: github.event_name == 'release' && github.event.action == 'created'
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Download all wheel artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  pattern: dist-*
                  merge-multiple: true

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              continue-on-error: true

            - name: Download all conda artifacts
              uses: actions/download-artifact@v4
              with:
                  path: conda-dist
                  pattern: conda-dist-*
                  merge-multiple: true

            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@v0.9.2
              with:
                  pixi-version: latest

            - name: Publish to prefix.dev
              run: |
                  for package in conda-dist/*.conda; do
                    pixi project channel upload --host https://prefix.dev prefix-dev "$package" || true
                  done
              shell: bash
